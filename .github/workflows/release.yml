name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  release:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate bump-version.sh
        run: |
          if [ ! -f scripts/bump-version.sh ]; then
            echo "scripts/bump-version.sh not found" >&2
            exit 1
          fi
          if [ ! -x scripts/bump-version.sh ]; then
            echo "scripts/bump-version.sh is not executable" >&2
            exit 1
          fi

      - name: Validate changelog entry
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -qF "## [${VERSION}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md não contém entrada para a versão ${VERSION}. Execute 'npm run changelog -- --for ${VERSION}' antes de publicar." >&2
            exit 1
          fi

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v ver="$VERSION" '$0 ~ ("^## \\[" ver "\\]") {found=1; next} found && /^## \[/ {exit} found {print}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        with:
          script: |
            const notes = process.env.RELEASE_NOTES;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: context.ref.replace('refs/tags/', ''),
              body: notes,
              draft: false,
              prerelease: false,
            });
