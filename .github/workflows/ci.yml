name: CI

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - 'apps/ui/**'

  build:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build:core
      - run: npm run typecheck
      - name: Build UI
        if: needs.changes.outputs.ui == 'true'
        run: npm run build:ui
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            bin/
            dist/
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .
      - run: npm test

  storybook:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - run: cd apps/ui && npm run storybook:build
