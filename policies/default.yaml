version: "1"
timeouts:
  dev: 600
  test: 300
  perf: 180
  security: 180
  review: 180
  homolog: 60
  pr: 120
policies:
  - name: gate-critical
    when:
      finding.severity: critical
    then:
      - action: fail_gate
      - action: log
        message: "Critical finding: {{finding.title}}"

  - name: gate-high
    when:
      finding.severity: high
    then:
      - action: fail_gate

  - name: gate-medium
    when:
      finding.severity: medium
    then:
      - action: warn_gate

  - name: gate-low
    when:
      finding.severity: low
    then:
      - action: pass_gate
